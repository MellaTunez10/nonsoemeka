# =============================================================================
# Nonsoemeka Pharmacy — Full-Stack Docker Compose
#
# Orchestrates all three services:
#   db       → PostgreSQL 15
#   api      → Go REST API (nonsoemeka-backend)
#   frontend → React SPA served via nginx (nonsoemeka-frontend)
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d --build
#
# The frontend is the single public entrypoint on port 80.
# nginx reverse-proxies all /api/* requests to the Go API internally,
# so the browser sees one origin and CORS is not a concern.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: nonsoemeka_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB:       ${DB_NAME:-nonsoemeka}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nonsoemeka}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    # Not exposed to the host — reachable only by the api service on the
    # internal Docker network
    expose:
      - "5432"

  # ---------------------------------------------------------------------------
  # Go REST API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./nonsoemeka-backend
      dockerfile: Dockerfile
    container_name: nonsoemeka_api
    restart: unless-stopped
    environment:
      SERVER_PORT:                    8080
      DB_HOST:                        db
      DB_PORT:                        5432
      DB_USER:                        ${DB_USER:-postgres}
      DB_PASSWORD:                    ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME:                        ${DB_NAME:-nonsoemeka}
      DB_MAX_OPEN_CONNS:              25
      DB_MAX_IDLE_CONNS:              10
      DB_CONN_MAX_LIFETIME:           15m
      JWT_ACCESS_SECRET:              ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET:             ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_TTL:                 15m
      JWT_REFRESH_TTL:                168h
      LOG_LEVEL:                      ${LOG_LEVEL:-info}
      LOG_FORMAT:                     json
      RATE_LIMIT_LOGIN_PER_MINUTE:    ${RATE_LIMIT_LOGIN_PER_MINUTE:-5}
      RATE_LIMIT_GLOBAL_PER_MINUTE:   ${RATE_LIMIT_GLOBAL_PER_MINUTE:-300}
      # REQUIRED: Set to your production domain (e.g. https://pos.nonsoemeka.com).
      # For local dev, set ALLOWED_ORIGINS=http://localhost in your .env file.
      ALLOWED_ORIGINS:                ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
    depends_on:
      db:
        condition: service_healthy
    # The API is NOT exposed to the host; only nginx (frontend) talks to it
    expose:
      - "8080"

  # ---------------------------------------------------------------------------
  # Frontend — React SPA via nginx
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./nonsoemeka-frontend
      dockerfile: Dockerfile
    container_name: nonsoemeka_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # Database Backup — daily pg_dump at 02:00 UTC
  # ---------------------------------------------------------------------------
  db-backup:
    image: postgres:15-alpine
    container_name: nonsoemeka_db_backup
    restart: unless-stopped
    environment:
      PGHOST:     db
      PGPORT:     5432
      PGUSER:     ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATABASE: ${DB_NAME:-nonsoemeka}
      # Backups older than this many days are deleted automatically
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    volumes:
      - postgres_backups:/backups
    depends_on:
      db:
        condition: service_healthy
    # Run backup on start then every 24 h. Uses a plain sleep so it works on
    # Alpine busybox (no GNU date -d "tomorrow" support).
    # The backup file is named nonsoemeka-YYYY-MM-DDTHH-MM-SS.sql.gz
    command: >
      sh -c '
        trap exit TERM;
        run_backup() {
          FNAME="/backups/nonsoemeka-$$(date +%Y-%m-%dT%H-%M-%S).sql.gz";
          echo "Starting backup -> $$FNAME";
          pg_dump --no-password | gzip > "$$FNAME" && echo "Backup complete: $$FNAME";
          find /backups -name "nonsoemeka-*.sql.gz" -mtime +$${BACKUP_RETAIN_DAYS} -delete;
        };
        run_backup;
        while true; do
          sleep 86400 & wait $$!;
          run_backup;
        done
      '

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  # Named volume for daily pg_dump backups (see db-backup service above)
  postgres_backups:
