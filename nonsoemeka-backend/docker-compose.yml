services:
  db:
    image: postgres:15-alpine
    container_name: nonsoemeka_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nonsoemeka_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nonsoemeka_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nonsoemeka_api
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: nonsoemeka_db
      JWT_ACCESS_SECRET: nonsoemeka-prod-access-key-change-me
      JWT_REFRESH_SECRET: nonsoemeka-prod-refresh-key-change-me
      LOG_LEVEL: info
      LOG_FORMAT: json
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
