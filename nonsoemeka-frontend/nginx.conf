server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # --- Proxy all /api/* traffic to the Go API ---
    # This means the browser sees one origin and CORS is a non-issue.
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward cookies so the httpOnly refresh_token cookie works end-to-end
        proxy_pass_header  Set-Cookie;
    }

    # --- Proxy /healthz to the Go API (for load-balancer / uptime checks) ---
    location = /healthz {
        proxy_pass         http://api:8080/healthz;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # --- Aggressively cache hashed static assets (JS/CSS bundles from Vite) ---
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires        1y;
        add_header     Cache-Control "public, immutable";
        try_files      $uri =404;
    }

    # --- SPA catch-all: every unknown path serves index.html ---
    location / {
        try_files $uri $uri/ /index.html;

        # index.html itself must not be cached so the browser always fetches
        # the latest hashed bundle references after a redeploy
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
